name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Check gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "$out"
            echo "::error::Files are not gofmt'd. Run 'make fmt'."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: go build
        run: go build ./cmd/bunny
